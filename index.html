<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Island Activity Calendar</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#ffffff; --bg2:#f5f5f3; --bg3:#efefec;
  --border:rgba(0,0,0,0.12); --border2:rgba(0,0,0,0.25);
  --text:#1a1a18; --text2:#5f5e5a; --text3:#888780;
  --radius:8px; --radius-lg:12px;
  --blue:#185FA5; --blue-dk:#0C447C; --red:#A32D2D;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;--border:rgba(255,255,255,0.12);--border2:rgba(255,255,255,0.25);--text:#f0efe8;--text2:#b4b2a9;--text3:#888780;}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;}
.page{max-width:960px;margin:0 auto;padding:1.5rem 1rem 3rem;}

.banner{background:#FFF8E6;border:1px solid #F0C040;border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:12px;}
.banner.hidden{display:none;}
.banner h4{font-size:14px;font-weight:500;color:#854F0B;margin-bottom:4px;}
.banner p{font-size:13px;color:#633806;line-height:1.5;}
.banner input{width:100%;margin-top:8px;font-size:13px;padding:6px 9px;border:1px solid #F0C040;border-radius:var(--radius);background:white;color:#1a1a18;font-family:inherit;}
.banner-btns{display:flex;gap:8px;margin-top:8px;}
.banner-btns button{font-size:13px;padding:5px 14px;border-radius:var(--radius);cursor:pointer;font-family:inherit;}
.btn-connect{background:#185FA5;color:white;border:none;}
.btn-connect:hover{background:#0C447C;}
.btn-dismiss{background:none;border:1px solid #F0C040;color:#633806;}

.status-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);margin-bottom:10px;min-height:20px;}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:#BA7517;}
.sdot.green{background:#1D9E75;} .sdot.red{background:#E24B4A;}

header{display:flex;align-items:center;gap:12px;margin-bottom:1.25rem;}
header h1{font-size:20px;font-weight:500;}
.logo{width:32px;height:32px;border-radius:8px;background:#185FA5;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.logo svg{width:18px;height:18px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;}

.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:8px;}
.mnav{display:flex;align-items:center;gap:10px;}
.mnav button{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:4px 14px;cursor:pointer;font-size:15px;color:var(--text);}
.mnav button:hover{background:var(--bg2);}
.mtitle{font-size:18px;font-weight:500;min-width:170px;text-align:center;}
.legend{display:flex;gap:12px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;}
.dh{background:var(--bg2);padding:6px 0;text-align:center;font-size:12px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);}
.dc{min-height:84px;padding:5px;border-right:0.5px solid var(--border);border-bottom:0.5px solid var(--border);background:var(--bg);cursor:pointer;transition:background .1s;vertical-align:top;}
.dc:hover{background:var(--bg2);}
.dc.om{background:var(--bg3);opacity:.4;cursor:default;pointer-events:none;}
.dc:nth-child(7n){border-right:none;}
.dn{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:3px;}
.today-b{background:#185FA5;color:white;border-radius:50%;width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;}
.epill{font-size:10px;border-radius:4px;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;line-height:1.4;}
.more{font-size:10px;color:var(--text3);padding:1px 3px;}
.cal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px;flex-wrap:wrap;gap:8px;}
.refresh-btn{font-size:13px;color:var(--text2);background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:6px 12px;cursor:pointer;}
.refresh-btn:hover{background:var(--bg2);}

button.primary{background:var(--blue);color:white;border:none;border-radius:var(--radius);padding:8px 18px;font-size:14px;cursor:pointer;font-family:inherit;}
button.primary:hover{background:var(--blue-dk);}
button.primary:disabled{background:#888;cursor:not-allowed;}
button.secondary{background:none;border:0.5px solid var(--border2);border-radius:var(--radius);padding:7px 16px;font-size:14px;cursor:pointer;color:var(--text);font-family:inherit;}
button.secondary:hover{background:var(--bg2);}
button.danger{background:var(--red);color:white;border:none;border-radius:var(--radius);padding:7px 16px;font-size:14px;cursor:pointer;font-family:inherit;}
button.danger:hover{background:#791F1F;}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.modal-overlay.open{display:flex;}
.mbox{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;width:430px;max-width:100%;}
.mbox h3{font-size:16px;font-weight:500;margin-bottom:1.25rem;}
.fr{margin-bottom:10px;}
.fr label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;}
.fr input,.fr select,.fr textarea{width:100%;font-size:13px;padding:7px 9px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit;}
.fr textarea{resize:vertical;min-height:60px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.slabel{font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin:14px 0 8px;border-top:0.5px solid var(--border);padding-top:12px;}
.mbtns{display:flex;gap:8px;justify-content:flex-end;margin-top:1.25rem;flex-wrap:wrap;}
.saving-msg{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;margin-right:auto;}
.edet{background:var(--bg2);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px;}
.edet .et{font-size:15px;font-weight:500;}
.edet .em{font-size:12px;color:var(--text2);margin-top:4px;line-height:1.6;}
.edet .en{font-size:13px;color:var(--text);margin-top:8px;font-style:italic;border-top:0.5px solid var(--border);padding-top:8px;}
.tbadge{display:inline-block;font-size:11px;border-radius:4px;padding:2px 7px;margin-left:6px;vertical-align:middle;}
.multi-day-bar{font-size:9px;border-radius:3px;padding:1px 4px;margin-bottom:2px;opacity:.85;}

.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

.date-range-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.date-hint{font-size:11px;color:var(--text3);margin-top:3px;}
</style>
</head>
<body>
<div class="page">

  <div class="banner" id="setup-banner">
    <div style="font-size:20px;flex-shrink:0;margin-top:2px;">⚙️</div>
    <div style="flex:1;">
      <h4>Connect your Google Sheet</h4>
      <p>Paste your Google Apps Script Web App URL to enable real-time shared data for all departments.</p>
      <input type="text" id="url-input" placeholder="https://script.google.com/macros/s/YOUR_ID/exec" />
      <div class="banner-btns">
        <button class="btn-connect" onclick="saveUrl()">Connect</button>
        <button class="btn-dismiss" onclick="dismissBanner()">Dismiss</button>
      </div>
    </div>
  </div>

  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
    </div>
    <h1>Island Activity Calendar</h1>
  </header>

  <div class="status-bar">
    <div class="sdot" id="sdot"></div>
    <span id="stxt">Connecting to shared calendar...</span>
  </div>

  <div class="card">
    <div class="top-bar">
      <div class="mnav">
        <button onclick="cm(-1)">&#8249;</button>
        <div class="mtitle" id="mtitle"></div>
        <button onclick="cm(1)">&#8250;</button>
      </div>
      <div class="legend">
        <div class="leg"><div class="dot" style="background:#E24B4A;"></div>Security</div>
        <div class="leg"><div class="dot" style="background:#1D9E75;"></div>Locations</div>
        <div class="leg"><div class="dot" style="background:#BA7517;"></div>Other</div>
        <div class="leg"><div class="dot" style="background:#534AB7;"></div>Block</div>
      </div>
    </div>
    <div id="cal-grid" class="cal-grid"></div>
    <div class="cal-footer">
      <button class="refresh-btn" onclick="loadEvents()">&#8635; Refresh</button>
      <button class="primary" onclick="openAdd(null)">+ Add event</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="mbox" id="modal-box"></div>
</div>

<script>
const LOCATIONS = {
  "Mana Island":["White Cross Lookout","Nabubu Beach","Circumnavigation","Mana Bay","Mana Jetty","Sunset Beach","Vitanive","Paradise Point Beach","Mana Sandbank"],
  "Yadua Island":["Yadua Island"],
  "Monuriki Island":["Savusavu","Nawai","Vabenau","Launatavuto","Rogua","TC1"],
  "Monu Island":["Vatule","Vilavilaniyalo","Qwaqwa","Kasa","Onedare","Liku","Muainalokoloko","Onena"],
  "Tavua Island":["Tavua Gardens","TC2","TC3"],
  "Diving / Snorkeling":["Yadua Pinacle","Seven Sisters","Mana Sandbank","Sunset Wall","Image","Supermarket","Dan's Wall","Tuanuku"]
};
const ACTIVITIES = ["Pic Nic","Overnight","Walk / Hike","Snorkeling","Scuba Diving","Aerial","Block"];
const DEPTS = ["Security","Locations","Other"];
const DEPT_BG  = {Security:"#FCEBEB",Locations:"#E1F5EE",Other:"#FAEEDA",Block:"#EEEDFE"};
const DEPT_TC  = {Security:"#A32D2D",Locations:"#0F6E56",Other:"#854F0B",Block:"#3C3489"};
const ACT_BG   = {Block:"#EEEDFE"};
const ACT_TC   = {Block:"#3C3489"};
const MONTHS   = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const URL_KEY  = "island_cal_url_v4";
const pad = n => String(n).padStart(2,"0");

let events=[], curYear, curMonth, scriptUrl="", refreshTimer=null;
let pendingResolve=null, pendingReject=null, pendingTimer=null;

// ── URL storage ──────────────────────────────────────────────
function init(){
  const now=new Date(); curYear=now.getFullYear(); curMonth=now.getMonth();
  scriptUrl=localStorage.getItem(URL_KEY)||"";
  if(scriptUrl) document.getElementById("setup-banner").classList.add("hidden");
  renderMonth(); loadEvents();
  refreshTimer=setInterval(loadEvents,30000);
}

function saveUrl(){
  const v=document.getElementById("url-input").value.trim();
  if(!v.startsWith("https://script.google.com")){alert("Please paste a valid Google Apps Script URL.");return;}
  scriptUrl=v; localStorage.setItem(URL_KEY,scriptUrl);
  document.getElementById("setup-banner").classList.add("hidden");
  loadEvents();
}
function dismissBanner(){document.getElementById("setup-banner").classList.add("hidden");}

// ── Status ───────────────────────────────────────────────────
function setStatus(state,msg){
  const d=document.getElementById("sdot"); d.className="sdot "+(state==="ok"?"green":state==="err"?"red":"");
  document.getElementById("stxt").textContent=msg;
}

// ── API via no-cors fetch (most reliable for GAS) ─────────────
async function apiCall(params){
  if(!scriptUrl) throw new Error("no_url");
  const url=new URL(scriptUrl);
  Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,String(v)));

  // Try fetch with mode no-cors first — GAS supports this via redirect
  // We use a JSONP approach as the most compatible cross-origin method
  return new Promise((resolve,reject)=>{
    const cb="gascb_"+Date.now()+"_"+Math.round(Math.random()*99999);
    const u=new URL(scriptUrl);
    Object.entries(params).forEach(([k,v])=>u.searchParams.set(k,String(v)));
    u.searchParams.set("callback",cb);

    let done=false;
    const timer=setTimeout(()=>{
      if(done)return; done=true;
      cleanup(); reject(new Error("timeout"));
    },20000);

    window[cb]=(data)=>{
      if(done)return; done=true;
      cleanup(); resolve(data);
    };

    function cleanup(){
      clearTimeout(timer); delete window[cb];
      const s=document.getElementById("gas-script");
      if(s) s.remove();
    }

    const script=document.createElement("script");
    script.id="gas-script";
    script.onerror=()=>{
      if(done)return; done=true;
      cleanup(); reject(new Error("script_failed"));
    };
    script.src=u.toString();
    document.head.appendChild(script);
  });
}

// ── Load events ───────────────────────────────────────────────
async function loadEvents(){
  if(!scriptUrl){setStatus("","Not connected — paste your Apps Script URL in the setup panel above");renderCal();return;}
  setStatus("","Loading...");
  try{
    const data=await apiCall({action:"getEvents"});
    if(data.error) throw new Error(data.error);
    events=(data.events||[]).map(e=>({...e,id:String(e.id)}));
    setStatus("ok","Live — updated "+new Date().toLocaleTimeString());
    renderCal();
  }catch(err){
    if(err.message==="script_failed"||err.message==="timeout"){
      setStatus("err","Connection failed — check your Script URL or redeploy");
    } else {
      setStatus("err","Error: "+err.message);
    }
    renderCal();
  }
}

// ── Calendar nav ──────────────────────────────────────────────
function cm(d){curMonth+=d;if(curMonth>11){curMonth=0;curYear++;}if(curMonth<0){curMonth=11;curYear--;}renderMonth();renderCal();}
function renderMonth(){document.getElementById("mtitle").textContent=MONTHS[curMonth]+" "+curYear;}

// ── Date helpers ──────────────────────────────────────────────
function dateRange(startStr,endStr){
  const dates=[];
  const s=new Date(startStr+"T00:00:00");
  const e=new Date((endStr||startStr)+"T00:00:00");
  const cur=new Date(s);
  while(cur<=e){
    dates.push(cur.getFullYear()+"-"+pad(cur.getMonth()+1)+"-"+pad(cur.getDate()));
    cur.setDate(cur.getDate()+1);
  }
  return dates;
}

function pillColor(ev){
  if(ev.activity==="Block") return {bg:"#EEEDFE",tc:"#3C3489"};
  return {bg:DEPT_BG[ev.dept]||"#eee",tc:DEPT_TC[ev.dept]||"#555"};
}

// ── Render calendar ───────────────────────────────────────────
function renderCal(){
  const grid=document.getElementById("cal-grid");
  const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let html=days.map(d=>`<div class="dh">${d}</div>`).join("");
  const first=new Date(curYear,curMonth,1).getDay();
  const dim=new Date(curYear,curMonth+1,0).getDate();
  const dipm=new Date(curYear,curMonth,0).getDate();
  const today=new Date();

  let cells=[];
  for(let i=0;i<first;i++) cells.push({day:dipm-first+1+i,cur:false});
  for(let i=1;i<=dim;i++) cells.push({day:i,cur:true});
  while(cells.length%7!==0) cells.push({day:cells.length-first-dim+1,cur:false});

  cells.forEach(c=>{
    const ds=`${curYear}-${pad(curMonth+1)}-${pad(c.day)}`;
    const isToday=c.cur&&today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===c.day;
    const numHtml=isToday?`<span class="today-b">${c.day}</span>`:c.day;

    let evts=[];
    if(c.cur){
      evts=events.filter(ev=>{
        const dates=dateRange(ev.dateStart,ev.dateEnd);
        return dates.includes(ds);
      });
    }
    const show=evts.slice(0,2);
    const pillsHtml=show.map(ev=>{
      const col=pillColor(ev);
      const isMulti=ev.dateEnd&&ev.dateEnd!==ev.dateStart;
      const label=isMulti?`${ev.activity} (${ev.dateStart.slice(5)}→${ev.dateEnd.slice(5)})`:ev.activity;
      return `<div class="epill" style="background:${col.bg};color:${col.tc}" onclick="openView('${ev.id}',event)">${label}</div>`;
    }).join("");
    const moreHtml=evts.length>2?`<div class="more">+${evts.length-2} more</div>`:"";
    const ca=c.cur?`onclick="openAdd('${ds}')"` :"";
    html+=`<div class="dc${c.cur?"":" om"}" ${ca}><div class="dn">${numHtml}</div>${pillsHtml}${moreHtml}</div>`;
  });
  grid.innerHTML=html;
}

// ── Modal helpers ─────────────────────────────────────────────
function openModal(html){document.getElementById("modal-box").innerHTML=html;document.getElementById("modal-overlay").classList.add("open");}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");}
function overlayClick(e){if(e.target===document.getElementById("modal-overlay"))closeModal();}
function subsOpts(loc,sel){return(LOCATIONS[loc]||[]).map(s=>`<option value="${s}"${s===sel?" selected":""}>${s}</option>`).join("");}
function updateSubs(){document.getElementById("f-sub").innerHTML=subsOpts(document.getElementById("f-loc").value,"");}

// ── Add event ─────────────────────────────────────────────────
function openAdd(date){
  const t=new Date();
  const def=date||`${t.getFullYear()}-${pad(t.getMonth()+1)}-${pad(t.getDate())}`;
  const firstLoc=Object.keys(LOCATIONS)[0];
  openModal(`
    <h3>Add event</h3>
    <div class="slabel">When</div>
    <div class="date-range-row">
      <div class="fr"><label>Start date</label><input type="date" id="f-start" value="${def}" onchange="syncEndDate()"></div>
      <div class="fr"><label>End date <span style="font-weight:400;color:var(--text3)">(optional)</span></label><input type="date" id="f-end" value="${def}"></div>
    </div>
    <div class="date-hint">For multi-day events, set an end date. Leave end = start for a single day.</div>
    <div class="slabel">Who &amp; what</div>
    <div class="frow">
      <div class="fr"><label>Submitted by</label><select id="f-dept">${DEPTS.map(d=>`<option>${d}</option>`).join("")}</select></div>
      <div class="fr"><label>Activity</label><select id="f-act">${ACTIVITIES.map(a=>`<option>${a}</option>`).join("")}</select></div>
    </div>
    <div class="slabel">Location</div>
    <div class="fr"><label>Location</label><select id="f-loc" onchange="updateSubs()">${Object.keys(LOCATIONS).map(l=>`<option>${l}</option>`).join("")}</select></div>
    <div class="fr"><label>Sub-location</label><select id="f-sub">${subsOpts(firstLoc,"")}</select></div>
    <div class="slabel">Details</div>
    <div class="fr"><label>Notes</label><textarea id="f-note" placeholder="Guest numbers, times, coordination needed..."></textarea></div>
    <div class="mbtns">
      <div class="saving-msg" id="saving-add" style="display:none"><div class="spinner"></div> Saving to shared calendar...</div>
      <button class="secondary" onclick="closeModal()">Cancel</button>
      <button class="primary" id="btn-add" onclick="saveAdd()">Save event</button>
    </div>
  `);
}

function syncEndDate(){
  const s=document.getElementById("f-start").value;
  const e=document.getElementById("f-end");
  if(!e.value||e.value<s) e.value=s;
}

async function saveAdd(){
  const dateStart=document.getElementById("f-start").value;
  const dateEnd=document.getElementById("f-end").value||dateStart;
  if(!dateStart){alert("Please select a start date.");return;}
  if(dateEnd<dateStart){alert("End date must be on or after start date.");return;}
  setSaving("saving-add","btn-add",true);
  try{
    const data=await apiCall({action:"addEvent",dateStart,dateEnd,dept:document.getElementById("f-dept").value,activity:document.getElementById("f-act").value,location:document.getElementById("f-loc").value,sublocation:document.getElementById("f-sub").value,note:document.getElementById("f-note").value.trim()});
    if(data.error) throw new Error(data.error);
    closeModal(); await loadEvents();
  }catch(err){
    setSaving("saving-add","btn-add",false);
    alert("Could not save. Error: "+err.message+"\n\nMake sure your Script URL is correct and redeployed.");
  }
}

// ── View event ────────────────────────────────────────────────
function openView(id,e){
  if(e) e.stopPropagation();
  const ev=events.find(x=>String(x.id)===String(id));
  if(!ev) return;
  const col=pillColor(ev);
  const dateDisplay=ev.dateEnd&&ev.dateEnd!==ev.dateStart?`${ev.dateStart} → ${ev.dateEnd}`:ev.dateStart;
  openModal(`
    <h3>Event details</h3>
    <div class="edet">
      <div class="et">${ev.activity}<span class="tbadge" style="background:${col.bg};color:${col.tc}">${ev.dept}</span></div>
      <div class="em">${dateDisplay}<br>${ev.location} &mdash; ${ev.sublocation}</div>
      ${ev.note?`<div class="en">${ev.note}</div>`:""}
    </div>
    <div class="mbtns">
      <button class="danger" onclick="deleteEvent('${id}')">Delete</button>
      <button class="secondary" onclick="openEdit('${id}')">Edit</button>
      <button class="primary" onclick="closeModal()">Close</button>
    </div>
  `);
}

// ── Edit event ────────────────────────────────────────────────
function openEdit(id){
  const ev=events.find(x=>String(x.id)===String(id));
  if(!ev) return;
  const dateEnd=ev.dateEnd||ev.dateStart;
  openModal(`
    <h3>Edit event</h3>
    <div class="slabel">When</div>
    <div class="date-range-row">
      <div class="fr"><label>Start date</label><input type="date" id="f-start" value="${ev.dateStart}"></div>
      <div class="fr"><label>End date</label><input type="date" id="f-end" value="${dateEnd}"></div>
    </div>
    <div class="slabel">Who &amp; what</div>
    <div class="frow">
      <div class="fr"><label>Submitted by</label><select id="f-dept">${DEPTS.map(d=>`<option${d===ev.dept?" selected":""}>${d}</option>`).join("")}</select></div>
      <div class="fr"><label>Activity</label><select id="f-act">${ACTIVITIES.map(a=>`<option${a===ev.activity?" selected":""}>${a}</option>`).join("")}</select></div>
    </div>
    <div class="slabel">Location</div>
    <div class="fr"><label>Location</label><select id="f-loc" onchange="updateSubs()">${Object.keys(LOCATIONS).map(l=>`<option${l===ev.location?" selected":""}>${l}</option>`).join("")}</select></div>
    <div class="fr"><label>Sub-location</label><select id="f-sub">${subsOpts(ev.location,ev.sublocation)}</select></div>
    <div class="slabel">Details</div>
    <div class="fr"><label>Notes</label><textarea id="f-note">${ev.note||""}</textarea></div>
    <div class="mbtns">
      <div class="saving-msg" id="saving-edit" style="display:none"><div class="spinner"></div> Saving...</div>
      <button class="secondary" onclick="closeModal()">Cancel</button>
      <button class="primary" id="btn-edit" onclick="saveEdit('${id}')">Save changes</button>
    </div>
  `);
}

async function saveEdit(id){
  const dateStart=document.getElementById("f-start").value;
  const dateEnd=document.getElementById("f-end").value||dateStart;
  if(dateEnd<dateStart){alert("End date must be on or after start date.");return;}
  setSaving("saving-edit","btn-edit",true);
  try{
    const data=await apiCall({action:"updateEvent",id,dateStart,dateEnd,dept:document.getElementById("f-dept").value,activity:document.getElementById("f-act").value,location:document.getElementById("f-loc").value,sublocation:document.getElementById("f-sub").value,note:document.getElementById("f-note").value.trim()});
    if(data.error) throw new Error(data.error);
    closeModal(); await loadEvents();
  }catch(err){
    setSaving("saving-edit","btn-edit",false);
    alert("Could not save: "+err.message);
  }
}

// ── Delete ────────────────────────────────────────────────────
async function deleteEvent(id){
  if(!confirm("Delete this event?")) return;
  try{
    await apiCall({action:"deleteEvent",id});
    closeModal(); await loadEvents();
  }catch(err){alert("Could not delete: "+err.message);}
}

function setSaving(msgId,btnId,on){
  document.getElementById(msgId).style.display=on?"flex":"none";
  document.getElementById(btnId).disabled=on;
}

init();
</script>
</body>
</html>
